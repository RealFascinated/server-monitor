name: Agent Release

on:
  push:
    tags:
      - "agent/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. agent/v2.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: monitor-agent

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: Agent/go.mod
          cache-dependency-path: Agent/go.sum

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$tag" =~ ^agent/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid agent release tag: $tag"
            echo "Expected format: agent/vMAJOR.MINOR.PATCH"
            exit 1
          fi

          version="${tag#agent/v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist

          platforms=(
            "linux amd64"
            "linux arm64"
            "windows amd64"
          )

          ldflags="-s -w -X main.agentVersion=${VERSION}"

          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "$platform"
            output="dist/${BINARY_NAME}-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              output="${output}.exe"
            fi

            echo "Building ${goos}/${goarch} -> ${output}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -ldflags "$ldflags" -o "$output" ./cmd/main.go
          done

          cp config-example.yml dist/config-example.yml
          cp install.sh dist/install.sh
          chmod +x dist/install.sh

          (
            cd dist
            sha256sum ${BINARY_NAME}-* config-example.yml install.sh > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Monitor Agent ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            Agent/dist/monitor-agent-*
            Agent/dist/config-example.yml
            Agent/dist/install.sh
            Agent/dist/checksums.txt

name: Agent Release

on:
  push:
    tags:
      - "agent/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. agent/v2.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: monitor-agent

defaults:
  run:
    working-directory: agent

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Resolve version
        id: version
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$tag" =~ ^agent/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid agent release tag: $tag"
            echo "Expected format: agent/vMAJOR.MINOR.PATCH"
            exit 1
          fi

          version="${tag#agent/v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test ./...

      - name: Build Linux release binaries
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ldflags="-s -w -X main.agentVersion=${VERSION}"
          for platform in "linux amd64" "linux arm64"; do
            read -r goos goarch <<< "$platform"
            output="dist/${BINARY_NAME}-${goos}-${goarch}"
            echo "Building ${goos}/${goarch} -> ${output}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -ldflags "$ldflags" -o "$output" ./cmd/main.go
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: agent/dist/monitor-agent-linux-*

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: version
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#agent/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build LHM helper
        shell: pwsh
        run: ./scripts/build-lhm.ps1

      - name: Test Windows packages
        shell: bash
        run: go test -tags lhmbundle ./...

      - name: Build Windows binary
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ldflags="-s -w -X main.agentVersion=${VERSION}"
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -tags lhmbundle -ldflags "$ldflags" -o "dist/${BINARY_NAME}-windows-amd64.exe" ./cmd/main.go

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: agent/dist/monitor-agent-windows-amd64.exe

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#agent/v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: agent/dist
          merge-multiple: true

      - name: Package release files
        shell: bash
        run: |
          set -euo pipefail
          cp config-example.yml dist/config-example.yml
          (
            cd dist
            sha256sum ${BINARY_NAME}-* config-example.yml > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Monitor Agent ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            agent/dist/monitor-agent-*
            agent/dist/config-example.yml
            agent/dist/checksums.txt

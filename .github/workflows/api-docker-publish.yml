name: Publish API Docker image

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "Dockerfile"
      - ".github/workflows/api-docker-publish.yml"
    tags:
      - "api/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag (e.g. api/v1.0.0). Leave empty to build :master from the selected branch."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ghcr.io/realfascinated/monitor-api

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Resolve build
        id: build
        shell: bash
        run: |
          set -euo pipefail
          image="${{ env.IMAGE_REPOSITORY }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            tag="${tag//[[:space:]]/}"
            if [ -z "$tag" ]; then
              version="master-$(git rev-parse --short HEAD)"
              {
                echo "version=$version"
                echo "tags<<EOF"
                echo "${image}:master"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ ! "$tag" =~ ^api/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid API release tag: $tag"
              echo "Expected format: api/vMAJOR.MINOR.PATCH"
              exit 1
            fi
            version="${tag#api/v}"
            {
              echo "version=$version"
              echo "tags<<EOF"
              echo "${image}:${version}"
              echo "${image}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            version="master-$(git rev-parse --short HEAD)"
            {
              echo "version=$version"
              echo "tags<<EOF"
              echo "${image}:master"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="${GITHUB_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^api/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Unexpected ref: ${GITHUB_REF}"
            exit 1
          fi
          version="${tag#api/v}"
          {
            echo "version=$version"
            echo "tags<<EOF"
            echo "${image}:${version}"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.build.outputs.image }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.build.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

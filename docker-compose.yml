name: monitor

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    restart: unless-stopped
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=12"
      - "-httpListenAddr=:8428"
      - "-deleteAuthKey=${VM_DELETE_KEY:-changeme}"
    volumes:
      - victoriametrics_data:/storage
    ports:
      - "${VICTORIAMETRICS_PORT:-8428}:8428"

  api:
    image: ${MONITOR_API_IMAGE:-ghcr.io/realfascinated/monitor-api:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      victoriametrics:
        condition: service_started
    environment:
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      MONITOR_ENCRYPTION_SECRET: ${MONITOR_ENCRYPTION_SECRET:?Set MONITOR_ENCRYPTION_SECRET in .env (openssl rand -hex 32)}
      MONITOR_WEBSITE_URL: ${MONITOR_WEBSITE_URL:-http://localhost:3000}
      MONITOR_VICTORIAMETRICS_DELETE_TOKEN: ${VM_DELETE_KEY:-changeme}
      MONITOR_MAXMIND_LICENSE: ${MAXMIND_LICENSE:-}
    volumes:
      - ./docker/application.yml:/home/container/application.yml:ro
      - maxmind_data:/home/container/work/geoip
    ports:
      - "${API_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  www:
    image: ${MONITOR_WWW_IMAGE:-ghcr.io/realfascinated/monitor-www:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      MONITOR_PUBLIC_API_URL: ${MONITOR_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${WWW_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # agent:
  #   profiles: [agent]
  #   image: ${MONITOR_AGENT_IMAGE:-ghcr.io/realfascinated/monitor-agent:latest}
  #   restart: unless-stopped
  #   privileged: true

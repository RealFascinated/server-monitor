server:
  address: 0.0.0.0
  port: 80
  servlet:
    context-path: /

# Spring Configuration
spring:
  threads:
    virtual:
      enabled: true

  # Don't serialize null values by default with Jackson
  jackson:
    default-property-inclusion: non_null
    mapper:
      sort-properties-alphabetically: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 200
        order_inserts: true
        order_updates: true
  datasource:
    url: jdbc:postgresql://10.0.0.167:6543/monitor
    username: monitor
    password: 4mMD6fi72Pe9xxIck7bmNH6lp2YSsR3n
    hikari:
      maximum-pool-size: 200
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  pattern:
    console: "%level %logger{36} - %msg%n"
  level:
    xyz.mcutils.backend: info
    # Suppress Apache HttpClient 5 retry INFO logs (e.g. 429 retry messages)
    org.apache.hc.client5.http.impl.classic.HttpRequestRetryExec: warn